[pytest]
# pasywnyportfel — konfiguracja pytest
# Autor koncepcji i projektu: Wojciech Krol / lurk@lurk.com.pl
#
# Uruchamianie:
#   pytest                    -- wszystkie testy
#   pytest -v                 -- szczegolowy output
#   pytest -k ledger_tax      -- tylko testy z "ledger_tax" w nazwie
#   pytest -m "not slow"      -- pomija testy oznaczone @pytest.mark.slow (jesli dodane)
#
# Wymaga: pip install -r requirements-dev.txt

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -ra --tb=short
